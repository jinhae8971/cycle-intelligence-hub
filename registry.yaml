# Cycle Intelligence Hub registry.
#
# Each system exposes a JSON endpoint through GitHub Pages. The hub fetches
# those endpoints, extracts the configured fields, and publishes one combined
# dashboard.

systems:
  - id: cci
    name: "Crypto Cycle"
    asset_class: "Crypto"
    description: "Bitcoin and broader crypto cycle positioning."
    label: "CCI"
    color: "#f7931a"
    data_url: "https://jinhae8971.github.io/crypto-cycle-intelligence/data/latest.json"
    dashboard_url: "https://jinhae8971.github.io/crypto-cycle-intelligence/"
    score_path: "ccs.composite"
    phase_path: "ccs.phase"
    dimensions_path: "ccs.dimensions"
    generated_at_paths:
      - "generated_at"
    axis: "x"

  - id: asci
    name: "AI / Semiconductor"
    asset_class: "Equities"
    description: "AI infrastructure and semiconductor sector cycle."
    label: "ASCI"
    color: "#3b82f6"
    data_url: "https://jinhae8971.github.io/ai-semi-cycle-intelligence/data/latest.json"
    dashboard_url: "https://jinhae8971.github.io/ai-semi-cycle-intelligence/"
    score_path: "ascs.composite"
    phase_path: "ascs.phase"
    dimensions_path: "ascs.dimensions"
    generated_at_paths:
      - "generated_at"
    axis: "y"

  - id: kospi-valuation
    name: "KOSPI Valuation Radar"
    asset_class: "Korea Equities"
    description: "KOSPI/KOSDAQ valuation breadth and sector valuation monitor."
    label: "KVR"
    color: "#dc2626"
    data_url: "https://jinhae8971.github.io/kospi-valuation-radar/data/latest.json"
    dashboard_url: "https://jinhae8971.github.io/kospi-valuation-radar/"
    generated_at_paths:
      - "generated_at_iso"
      - "generated_at_kst"
    metrics:
      universe: "universe_size"
      market: "market"

  - id: us-valuation
    name: "US Valuation Radar"
    asset_class: "US Equities"
    description: "US AI, semiconductor, and big tech valuation monitor."
    label: "UVR"
    color: "#10b981"
    data_url: "https://jinhae8971.github.io/us-valuation-radar/data/latest.json"
    dashboard_url: "https://jinhae8971.github.io/us-valuation-radar/"
    generated_at_paths:
      - "generated_at_iso"
      - "generated_at_kst"
    metrics:
      universe: "universe_size"

  - id: asts
    name: "AI Semi Cycle-Top"
    asset_class: "Equities"
    description: "AI semiconductor rally cycle-top detection (composite top-proximity, decisive-trigger overlay)."
    label: "ASTS"
    color: "#ef4444"
    data_url: "https://jinhae8971.github.io/ai-semi-top-monitor/data/latest.json"
    dashboard_url: "https://jinhae8971.github.io/ai-semi-top-monitor/"
    score_path: "asts.composite"
    phase_path: "asts.phase"
    dimensions_path: "asts.dimensions"
    generated_at_paths:
      - "generated_at"
