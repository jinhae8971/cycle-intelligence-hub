<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cycle Intelligence Hub</title>
  <meta name="description" content="Unified GitHub Actions and Pages dashboard for market cycle systems.">
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121922;
      --panel-2: #17202b;
      --line: #263241;
      --text: #edf2f7;
      --muted: #9aa7b5;
      --soft: #617080;
      --green: #15b87a;
      --amber: #f2b84b;
      --red: #e35f5f;
      --blue: #4d8df7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    a { color: inherit; text-decoration: none; }
    .wrap { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
    header {
      border-bottom: 1px solid var(--line);
      background: #0f151d;
    }
    .top {
      min-height: 128px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 24px 0;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
      font-weight: 760;
    }
    .subtitle { margin: 0; color: var(--muted); max-width: 760px; line-height: 1.55; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      white-space: nowrap;
    }
    main { padding: 24px 0 40px; }
    .grid { display: grid; gap: 16px; }
    .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); margin-bottom: 16px; }
    .systems { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 18px;
    }
    .stat-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .stat-value {
      margin-top: 8px;
      font-size: 30px;
      font-weight: 760;
      font-variant-numeric: tabular-nums;
    }
    .section-title {
      margin: 28px 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .section-title h2 { margin: 0; font-size: 18px; }
    .timestamp { color: var(--soft); font-size: 13px; }
    .system {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      min-height: 176px;
    }
    .system h3 { margin: 0; font-size: 20px; }
    .meta { margin-top: 6px; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .badge {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .score {
      text-align: right;
      min-width: 112px;
    }
    .score .num {
      font-size: 42px;
      line-height: 1;
      font-weight: 780;
      font-variant-numeric: tabular-nums;
    }
    .score .phase { margin-top: 8px; color: var(--muted); font-size: 13px; }
    .bar {
      height: 8px;
      background: #0d1219;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
      margin-top: 18px;
      grid-column: 1 / -1;
    }
    .fill { height: 100%; width: 0; background: var(--blue); }
    .metrics {
      grid-column: 1 / -1;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .metric {
      padding: 7px 9px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .insights { margin-top: 16px; }
    .insight + .insight { margin-top: 10px; }
    .insight-title { font-weight: 720; }
    .insight-detail { color: var(--muted); margin-top: 4px; line-height: 1.5; }
    .history {
      width: 100%;
      height: 260px;
      display: block;
    }
    .empty { color: var(--muted); line-height: 1.6; }
    footer {
      color: var(--soft);
      border-top: 1px solid var(--line);
      padding: 18px 0 28px;
      font-size: 13px;
    }
    @media (max-width: 860px) {
      .top { align-items: flex-start; flex-direction: column; }
      .actions { justify-content: flex-start; }
      .stats, .systems { grid-template-columns: 1fr; }
      .system { grid-template-columns: 1fr; }
      .score { text-align: left; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <div>
        <h1>Cycle Intelligence Hub</h1>
        <p class="subtitle">A GitHub Actions and GitHub Pages control plane for market-cycle systems under jinhae8971.</p>
      </div>
      <div class="actions">
        <a class="button" href="https://github.com/jinhae8971/cycle-intelligence-hub/actions">Actions</a>
        <a class="button" href="https://github.com/jinhae8971/cycle-intelligence-hub">Repository</a>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="grid stats" id="stats"></section>

    <div class="section-title">
      <h2>Registered Systems</h2>
      <div class="timestamp" id="generated">Loading...</div>
    </div>
    <section class="grid systems" id="systems"></section>

    <div class="section-title">
      <h2>Score History</h2>
      <div class="timestamp">Daily snapshots</div>
    </div>
    <section class="panel">
      <svg class="history" id="history" role="img" aria-label="Score history chart"></svg>
    </section>

    <div class="section-title">
      <h2>Insights</h2>
      <div class="timestamp" id="version"></div>
    </div>
    <section class="panel insights" id="insights"></section>
  </main>

  <footer>
    <div class="wrap">Updated by GitHub Actions. Data is loaded from this site's published JSON artifacts.</div>
  </footer>

  <script>
    const dataBase = "./data/";
    const fmt = new Intl.DateTimeFormat("en-US", {
      year: "numeric", month: "short", day: "2-digit",
      hour: "2-digit", minute: "2-digit", timeZoneName: "short"
    });

    async function getJson(name) {
      const response = await fetch(dataBase + name + "?t=" + Date.now());
      if (!response.ok) throw new Error(name + " returned " + response.status);
      return response.json();
    }

    function valueOrDash(value) {
      return value === null || value === undefined || value === "" ? "-" : value;
    }

    function renderStats(summary) {
      const i = summary.insights;
      const stats = [
        ["Reachable", `${i.reachable_systems}/${i.total_systems}`],
        ["Scored", `${i.scored_systems}/${i.total_systems}`],
        ["Average", i.avg_score == null ? "-" : Math.round(i.avg_score)],
        ["Spread", i.spread == null ? "-" : Math.round(i.spread)]
      ];
      document.getElementById("stats").innerHTML = stats.map(([label, value]) => `
        <article class="panel">
          <div class="stat-label">${label}</div>
          <div class="stat-value">${value}</div>
        </article>
      `).join("");
    }

    function renderSystems(systems) {
      document.getElementById("systems").innerHTML = systems.map(system => {
        const score = system.score == null ? null : Number(system.score);
        const width = score == null ? 0 : Math.max(0, Math.min(100, score));
        const metrics = Object.entries(system.metrics || {})
          .filter(([, value]) => value !== null && value !== undefined)
          .map(([key, value]) => `<span class="metric">${key}: ${valueOrDash(value)}</span>`)
          .join("");
        const stale = system.stale_hours == null ? "" : `<span class="metric">stale: ${Math.round(system.stale_hours)}h</span>`;
        const scoreText = score == null ? "n/a" : Math.round(score);
        return `
          <a class="panel system" href="${system.dashboard_url}" target="_blank" rel="noopener">
            <div>
              <span class="badge" style="border-color:${system.color}66;color:${system.color}">${system.label}</span>
              <h3>${system.name}</h3>
              <div class="meta">${system.asset_class}</div>
              <div class="meta">${system.description || ""}</div>
            </div>
            <div class="score">
              <div class="num">${scoreText}</div>
              <div class="phase">${system.phase}</div>
            </div>
            <div class="bar"><div class="fill" style="width:${width}%;background:${system.phase_color || system.color}"></div></div>
            <div class="metrics">${metrics}${stale}</div>
          </a>
        `;
      }).join("");
    }

    function renderInsights(insights) {
      const target = document.getElementById("insights");
      if (!insights.narratives || insights.narratives.length === 0) {
        target.innerHTML = `<div class="empty">No major cross-system warnings right now.</div>`;
        return;
      }
      target.innerHTML = insights.narratives.map(item => `
        <div class="insight">
          <div class="insight-title">${item.title}</div>
          <div class="insight-detail">${item.detail}</div>
        </div>
      `).join("");
    }

    function renderHistory(history, systems) {
      const svg = document.getElementById("history");
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 260;
      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      if (!history || history.length < 2) {
        svg.innerHTML = `<text x="18" y="38" fill="#9aa7b5">History will appear after at least two daily runs.</text>`;
        return;
      }
      const pad = { left: 42, right: 18, top: 18, bottom: 28 };
      const innerW = width - pad.left - pad.right;
      const innerH = height - pad.top - pad.bottom;
      const ids = systems.filter(s => s.score != null).map(s => s.id);
      const colorById = Object.fromEntries(systems.map(s => [s.id, s.color]));
      const x = index => pad.left + (index / (history.length - 1)) * innerW;
      const y = score => pad.top + (1 - score / 100) * innerH;
      const grid = [0, 20, 40, 60, 80, 100].map(v => `
        <line x1="${pad.left}" x2="${width - pad.right}" y1="${y(v)}" y2="${y(v)}" stroke="#263241" stroke-width="1"/>
        <text x="8" y="${y(v) + 4}" fill="#617080" font-size="11">${v}</text>
      `).join("");
      const lines = ids.map(id => {
        const points = history
          .map((row, index) => {
            const score = row.systems && row.systems[id] ? row.systems[id].score : null;
            return score == null ? null : `${x(index)},${y(score)}`;
          })
          .filter(Boolean)
          .join(" ");
        if (!points) return "";
        return `<polyline fill="none" stroke="${colorById[id] || "#4d8df7"}" stroke-width="3" points="${points}"/>`;
      }).join("");
      svg.innerHTML = grid + lines;
    }

    async function main() {
      try {
        const [summary, history] = await Promise.all([
          getJson("hub_summary.json"),
          getJson("hub_history.json").catch(() => [])
        ]);
        renderStats(summary);
        renderSystems(summary.systems || []);
        renderInsights(summary.insights || { narratives: [] });
        renderHistory(history, summary.systems || []);
        document.getElementById("generated").textContent = fmt.format(new Date(summary.generated_at));
        document.getElementById("version").textContent = "v" + valueOrDash(summary.version);
      } catch (error) {
        document.getElementById("systems").innerHTML = `<article class="panel empty">Unable to load hub data: ${error.message}</article>`;
        document.getElementById("stats").innerHTML = "";
        document.getElementById("generated").textContent = "Data unavailable";
      }
    }

    main();
  </script>
</body>
</html>
