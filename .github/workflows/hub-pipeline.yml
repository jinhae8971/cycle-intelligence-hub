name: hub-pipeline

on:
  schedule:
    - cron: "10 22 * * *" # 07:10 KST
  workflow_dispatch:

concurrency:
  group: cycle-intelligence-hub
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Resolve hub URL
        run: |
          echo "HUB_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"

      - name: Run aggregation
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Asia/Seoul
        run: python scripts/run_hub.py

      - name: Commit updated data
        run: |
          git config user.name "hub-bot[bot]"
          git config user.email "hub-bot[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: update hub data"
            git push
          fi

      - name: Prepare Pages site
        run: |
          mkdir -p docs/site/data
          cp -r data/* docs/site/data/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

  deploy:
    needs: aggregate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
